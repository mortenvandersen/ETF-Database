<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETF Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f7f8fa;
      --border: #e4e7ec;
      --text: #1e2a38;
      --muted: #7a8899;
      --accent: #00b4c5;
      --green: #0ea86a;
      --red: #d94040;
      --yellow: #e09800;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header p { color: var(--muted); font-size: 0.88rem; }
    #last-updated { margin-left: auto; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* ── Stat Cards ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      border-radius: 10px;
      padding: 20px 18px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      right: -16px; top: -16px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .stat-card .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      opacity: 0.88;
      font-weight: 600;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 6px;
      line-height: 1;
    }
    .stat-card .sub { font-size: 0.75rem; opacity: 0.8; margin-top: 4px; }

    .card-teal    { background: linear-gradient(135deg, #00b4c5, #0090a0); }
    .card-pink    { background: linear-gradient(135deg, #e0297a, #b81f60); }
    .card-green   { background: linear-gradient(135deg, #00a86b, #007a4e); }
    .card-orange  { background: linear-gradient(135deg, #f5a623, #d4861a); }
    .card-navy    { background: linear-gradient(135deg, #3a6bc4, #2a52a0); }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px 8px 34px;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); background: #fff; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); background: #fff; }
    .count-label {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 500;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead { position: sticky; top: 0; z-index: 2; }
    th {
      background: var(--surface2);
      padding: 11px 14px;
      text-align: left;
      font-size: 0.71rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      border-bottom: 2px solid var(--border);
    }
    th:hover { color: var(--text); }
    th.sorted { color: var(--accent); }
    th .sort-arrow { margin-left: 3px; opacity: 0.4; }
    th.sorted .sort-arrow { opacity: 1; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.08s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f0fafc; }
    td { padding: 10px 14px; white-space: nowrap; color: var(--text); }

    .symbol { font-weight: 700; color: var(--accent); font-size: 0.88rem; }
    .etf-name { max-width: 240px; overflow: hidden; text-overflow: ellipsis; color: var(--text); }

    /* Return coloring */
    .ret { font-variant-numeric: tabular-nums; text-align: right; font-weight: 500; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: #bcc5cf; }

    /* Rating badge */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 5px;
      font-size: 0.73rem;
      font-weight: 700;
    }
    .badge-A { background: #d4f5e6; color: #0a7a44; }
    .badge-B { background: #ddeeff; color: #1a5fb4; }
    .badge-C { background: #fff3d0; color: #9a6200; }
    .badge-D { background: #fde8e8; color: #a82020; }

    /* Asset class pill */
    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .pill-Equity           { background: #ddeeff; color: #1a5fb4; }
    .pill-Bond             { background: #d4f5e6; color: #0a7a44; }
    .pill-Commodity        { background: #fff3d0; color: #9a6200; }
    .pill-Real\ Estate     { background: #fde8e8; color: #a82020; }
    .pill-Multi-Asset      { background: #ede8fb; color: #5630b0; }
    .pill-Currency         { background: #d6f5f7; color: #0a7a82; }
    .pill-Alternatives     { background: #f0f5d4; color: #5a6e00; }
    .pill-Preferred\ Stock { background: #feefd6; color: #8a4e00; }

    /* Loading / Error */
    .status-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.95rem; }
    .status-msg code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .etf-name { max-width: 140px; }
      .header { flex-wrap: wrap; }
      #last-updated { margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>ETF Dashboard</h1>
  <p>Browse, filter, and sort your ETF database</p>
  <div id="last-updated"></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card card-teal">
    <div class="label">Total ETFs</div>
    <div class="value" id="stat-total">—</div>
  </div>
  <div class="stat-card card-pink">
    <div class="label">Avg Dividend Yield</div>
    <div class="value" id="stat-div">—</div>
  </div>
  <div class="stat-card card-green">
    <div class="label">Avg 1-Year Return</div>
    <div class="value" id="stat-1y">—</div>
  </div>
  <div class="stat-card card-orange">
    <div class="label">Top Rated (A / A-)</div>
    <div class="value" id="stat-a">—</div>
    <div class="sub">ETFs</div>
  </div>
  <div class="stat-card card-navy">
    <div class="label">Asset Classes</div>
    <div class="value" id="stat-classes">—</div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input type="text" id="search" placeholder="Search symbol or name…" />
  </div>

  <select id="filter-asset">
    <option value="">All Asset Classes</option>
  </select>

  <select id="filter-category">
    <option value="">All Categories</option>
  </select>

  <select id="filter-geo">
    <option value="">All Geographies</option>
  </select>

  <select id="filter-rating">
    <option value="">All Ratings</option>
    <option>A</option><option>A-</option>
    <option>B+</option><option>B</option><option>B-</option>
    <option>C+</option><option>C</option><option>C-</option>
  </select>

  <select id="filter-usecase">
    <option value="">All Use Cases</option>
  </select>

  <span class="count-label" id="row-count"></span>
</div>

<!-- Table -->
<div class="table-wrap">
  <div class="status-msg" id="status">Loading ETF data…</div>
  <table id="etf-table" style="display:none">
    <thead>
      <tr>
        <th data-col="Symbol">Symbol <span class="sort-arrow">↕</span></th>
        <th data-col="ETF Name">Name <span class="sort-arrow">↕</span></th>
        <th data-col="Asset Class">Asset Class <span class="sort-arrow">↕</span></th>
        <th data-col="Geography">Geography <span class="sort-arrow">↕</span></th>
        <th data-col="1 Week" class="ret">1 Wk <span class="sort-arrow">↕</span></th>
        <th data-col="1 Month" class="ret">1 Mo <span class="sort-arrow">↕</span></th>
        <th data-col="1 Year" class="ret">1 Yr <span class="sort-arrow">↕</span></th>
        <th data-col="3 Year" class="ret">3 Yr <span class="sort-arrow">↕</span></th>
        <th data-col="5 Year" class="ret">5 Yr <span class="sort-arrow">↕</span></th>
        <th data-col="Annual Dividend Yield %" class="ret">Div Yield <span class="sort-arrow">↕</span></th>
        <th data-col="P/E Ratio" class="ret">P/E <span class="sort-arrow">↕</span></th>
        <th data-col="# of Holdings" class="ret">Holdings <span class="sort-arrow">↕</span></th>
        <th data-col="Returns Rating">Rating <span class="sort-arrow">↕</span></th>
        <th data-col="Use Case">Use Case <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
// ── CSV parser (handles quoted fields) ──────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = parseRow(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] ?? '').trim());
    return obj;
  }).filter(r => r['Symbol']);
}

function parseRow(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuote = !inQuote; continue; }
    if (c === ',' && !inQuote) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

// ── Parse percent/number ────────────────────────────────────────────────────
function toNum(val) {
  if (!val || val === '') return null;
  return parseFloat(val.replace('%', ''));
}

// ── Format helpers ──────────────────────────────────────────────────────────
function fmtRet(val) {
  if (!val || val.trim() === '') return '<span class="neu">—</span>';
  const n = toNum(val);
  if (n === null) return '<span class="neu">—</span>';
  const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
  return `<span class="ret ${cls}">${n > 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
}

function fmtRating(r) {
  if (!r) return '';
  const cat = r.startsWith('A') ? 'A' : r.startsWith('B') ? 'B' : r.startsWith('C') ? 'C' : 'D';
  return `<span class="badge badge-${cat}">${r}</span>`;
}

function fmtAsset(a) {
  return `<span class="pill pill-${CSS.escape(a)}">${a || '—'}</span>`;
}

// ── State ───────────────────────────────────────────────────────────────────
let allData = [];
let sortCol = '1 Year';
let sortAsc = false;

// ── Populate filter dropdowns ───────────────────────────────────────────────
function populateFilters(data) {
  const unique = (key) => [...new Set(data.map(d => d[key]).filter(Boolean))].sort();

  ['filter-asset', 'filter-category', 'filter-geo', 'filter-usecase'].forEach((id, i) => {
    const key = ['Asset Class', 'Primary Category', 'Geography', 'Use Case'][i];
    const sel = document.getElementById(id);
    unique(key).forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  });
}

// ── Stats cards ─────────────────────────────────────────────────────────────
function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;

  const divs = data.map(d => toNum(d['Annual Dividend Yield %'])).filter(n => n !== null);
  document.getElementById('stat-div').textContent =
    divs.length ? (divs.reduce((a,b)=>a+b,0)/divs.length).toFixed(2)+'%' : '—';

  const yrs = data.map(d => toNum(d['1 Year'])).filter(n => n !== null);
  const avg1y = yrs.length ? yrs.reduce((a,b)=>a+b,0)/yrs.length : null;
  const el1y = document.getElementById('stat-1y');
  el1y.textContent = avg1y !== null ? (avg1y > 0 ? '+' : '') + avg1y.toFixed(2)+'%' : '—';

  const topRated = data.filter(d => d['Returns Rating'] === 'A' || d['Returns Rating'] === 'A-').length;
  document.getElementById('stat-a').textContent = topRated;

  const classes = new Set(data.map(d => d['Asset Class']).filter(Boolean)).size;
  document.getElementById('stat-classes').textContent = classes;
}

// ── Filter + sort ────────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const asset = document.getElementById('filter-asset').value;
  const category = document.getElementById('filter-category').value;
  const geo = document.getElementById('filter-geo').value;
  const rating = document.getElementById('filter-rating').value;
  const usecase = document.getElementById('filter-usecase').value;

  let rows = allData.filter(d => {
    if (q && !d['Symbol'].toLowerCase().includes(q) && !d['ETF Name'].toLowerCase().includes(q)) return false;
    if (asset && d['Asset Class'] !== asset) return false;
    if (category && d['Primary Category'] !== category) return false;
    if (geo && d['Geography'] !== geo) return false;
    if (rating && d['Returns Rating'] !== rating) return false;
    if (usecase && d['Use Case'] !== usecase) return false;
    return true;
  });

  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    // numeric cols
    const nv = toNum(va), nb = toNum(vb);
    if (nv !== null || nb !== null) {
      const na2 = nv ?? -Infinity, nb2 = nb ?? -Infinity;
      return sortAsc ? na2 - nb2 : nb2 - na2;
    }
    // string
    va = (va ?? '').toLowerCase(); vb = (vb ?? '').toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  return rows;
}

// ── Render table ─────────────────────────────────────────────────────────────
function render() {
  const rows = getFiltered();
  document.getElementById('row-count').textContent = `${rows.length} ETFs`;
  updateStats(rows);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = rows.map(d => `
    <tr>
      <td class="symbol">${d['Symbol']}</td>
      <td><div class="etf-name" title="${d['ETF Name']}">${d['ETF Name']}</div></td>
      <td>${fmtAsset(d['Asset Class'])}</td>
      <td style="color:var(--muted);font-size:.82rem">${d['Geography'] || '—'}</td>
      <td>${fmtRet(d['1 Week'])}</td>
      <td>${fmtRet(d['1 Month'])}</td>
      <td>${fmtRet(d['1 Year'])}</td>
      <td>${fmtRet(d['3 Year'])}</td>
      <td>${fmtRet(d['5 Year'])}</td>
      <td>${fmtRet(d['Annual Dividend Yield %'])}</td>
      <td style="text-align:right;color:var(--muted)">${d['P/E Ratio'] || '—'}</td>
      <td style="text-align:right;color:var(--muted)">${d['# of Holdings'] || '—'}</td>
      <td>${fmtRating(d['Returns Rating'])}</td>
      <td style="font-size:.8rem;color:var(--muted)">${d['Use Case'] || '—'}</td>
    </tr>
  `).join('');
}

// ── Sort headers ──────────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
    render();
  });
});

// ── Filter listeners ──────────────────────────────────────────────────────────
['search','filter-asset','filter-category','filter-geo','filter-rating','filter-usecase'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

// Default sorted header highlight
document.querySelector('th[data-col="1 Year"]').classList.add('sorted');
document.querySelector('th[data-col="1 Year"] .sort-arrow').textContent = '↓';

// ── Load CSV ──────────────────────────────────────────────────────────────────
const CSV_FILE = 'ETF Long List - ETF Database.csv';

fetch(CSV_FILE)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.text();
  })
  .then(text => {
    allData = parseCSV(text);
    populateFilters(allData);
    document.getElementById('status').style.display = 'none';
    document.getElementById('etf-table').style.display = '';

    // Show file load date
    document.getElementById('last-updated').textContent =
      `${allData.length} ETFs loaded · Data file: ${CSV_FILE}`;

    render();
  })
  .catch(err => {
    document.getElementById('status').innerHTML = `
      <strong>Could not load CSV file.</strong><br><br>
      ${err.message}<br><br>
      <em>If opening locally, run a simple web server:<br>
      <code>python -m http.server 8000</code><br>
      then open <code>http://localhost:8000</code></em>
    `;
  });
</script>
</body>
</html>
